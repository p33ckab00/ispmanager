{% extends "settings_app/base_settings.html" %}
{% block settings_content %}
<div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
  <h3 class="font-semibold text-gray-700 mb-6">Router Settings</h3>
  <form method="post" class="space-y-4 max-w-lg">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Default API Port</label>
        <input type="number" name="default_api_port" value="{{ form.default_api_port.value|default:8728 }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Connection Timeout (sec)</label>
        <input type="number" name="connection_timeout_seconds" value="{{ form.connection_timeout_seconds.value|default:5 }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Live Poll Interval (sec)</label>
        <input type="number" name="polling_interval_seconds" min="5" value="{{ form.polling_interval_seconds.value|default:10 }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p class="text-xs text-gray-400 mt-1">Minimum 5 seconds recommended.</p>
      </div>
    </div>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="sync_on_startup" {% if form.sync_on_startup.value %}checked{% endif %}
        class="w-4 h-4 rounded border-gray-300 text-blue-600">
      <span class="text-sm text-gray-700">Auto-sync subscribers on server startup</span>
    </label>
    <button type="submit"
      class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
      Save Changes
    </button>
  </form>
</div>
{% endblock %}
