{% extends "settings_app/base_settings.html" %}
{% block settings_content %}
<div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
  <h3 class="font-semibold text-gray-700 mb-6">SMS Settings (Semaphore)</h3>
  <form method="post" class="space-y-4 max-w-lg">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Semaphore API Key</label>
      <input type="password" name="semaphore_api_key" value="{{ form.semaphore_api_key.value|default:'' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Your Semaphore API key">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Sender Name (max 11 chars)</label>
      <input type="text" name="sender_name" maxlength="11" value="{{ form.sender_name.value|default:'ISPManager' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      {% if form.sender_name.errors %}<p class="text-red-500 text-xs mt-1">{{ form.sender_name.errors.0 }}</p>{% endif %}
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Send Time (HH:MM)</label>
        <input type="time" name="billing_sms_schedule" value="{{ form.billing_sms_schedule.value|default:'08:00' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Days Before Due Date</label>
        <input type="number" name="billing_sms_days_before_due" min="1" value="{{ form.billing_sms_days_before_due.value|default:3 }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">SMS Template</label>
      <textarea name="billing_sms_template" rows="4"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{ form.billing_sms_template.value }}</textarea>
      <p class="text-xs text-gray-400 mt-1">Variables: {name} {amount} {currency} {due_date} {link}</p>
    </div>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="enable_billing_sms" {% if form.enable_billing_sms.value %}checked{% endif %}
        class="w-4 h-4 rounded border-gray-300 text-blue-600">
      <span class="text-sm text-gray-700">Enable scheduled billing SMS</span>
    </label>
    <button type="submit"
      class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
      Save Changes
    </button>
  </form>
</div>
{% endblock %}
