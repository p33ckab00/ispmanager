{% extends "base.html" %}
{% block content %}
<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800">Settings</h2>
  <p class="text-gray-500 text-sm mt-1">System and module configuration.</p>
</div>
<div class="flex gap-6">
  <aside class="w-52 shrink-0">
    <nav class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden text-sm">
      {% for url, label, icon, key in nav_items %}
      <a href="{{ url }}" class="flex items-center gap-2 px-4 py-3 hover:bg-gray-50 border-b border-gray-50 last:border-0
        {% if active == key %}bg-blue-50 text-blue-600 font-medium{% else %}text-gray-700{% endif %}">
        <i class="fa {{ icon }} w-4"></i> {{ label }}
      </a>
      {% endfor %}
    </nav>
  </aside>
  <div class="flex-1">
    {% include "partials/messages.html" %}
    {% block settings_content %}{% endblock %}
  </div>
</div>
{% endblock %}
