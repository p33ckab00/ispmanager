<div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap items-end gap-3">
  <form method="post" action="{% url 'accounting-report-preset-save' saved_report_preset_report_key %}" class="flex flex-wrap items-end gap-2">
    {% csrf_token %}
    <input type="hidden" name="query_string" value="{{ saved_report_preset_query_string }}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Save Preset</label>
      <input type="text" name="name" maxlength="120" placeholder="Preset name" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
    </div>
    <button type="submit" class="bg-gray-900 hover:bg-gray-800 text-white font-semibold px-4 py-2 rounded-lg text-sm">Save</button>
  </form>

  {% for preset in saved_report_presets %}
  <div class="inline-flex items-center gap-1">
    <a href="{% url 'accounting-report-preset-apply' preset.pk %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold px-3 py-2 rounded-lg">{{ preset.name }}</a>
    <form method="post" action="{% url 'accounting-report-preset-delete' preset.pk %}">
      {% csrf_token %}
      <button type="submit" class="bg-white hover:bg-red-50 border border-gray-200 hover:border-red-200 text-gray-500 hover:text-red-600 text-sm font-semibold px-3 py-2 rounded-lg">Delete</button>
    </form>
  </div>
  {% endfor %}
</div>
