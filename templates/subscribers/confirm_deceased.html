{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-8 max-w-md">
  <div class="mb-4 flex items-center gap-3">
    <i class="fa fa-triangle-exclamation text-3xl text-red-500"></i>
    <div><h2 class="text-xl font-bold text-gray-800">Mark as Deceased</h2>
    <p class="text-sm text-gray-500">{{ subscriber.display_name }}</p></div>
  </div>
  <div class="bg-red-50 border border-red-100 rounded-lg p-3 mb-4 text-sm text-red-700">
    All open invoices will be <strong>voided</strong>. PPP disabled. Account hidden from NMS. This cannot be undone.
  </div>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Date of Death</label>
      <input type="date" name="deceased_date" value="{{ form.deceased_date.value|default:'' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes (optional)</label>
      <textarea name="note" rows="3"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Next of kin info, obituary reference, etc."></textarea>
    </div>
    <div class="flex flex-col-reverse gap-3 sm:flex-row">
      <a href="/subscribers/{{ subscriber.pk }}/" class="inline-flex items-center justify-center text-sm text-gray-500 px-3 py-2">Cancel</a>
      <button type="submit" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2 rounded-lg text-sm">Confirm</button>
    </div>
  </form>
</div>
{% endblock %}
