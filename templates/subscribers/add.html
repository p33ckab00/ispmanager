{% extends "base.html" %}
{% block title %}Add Subscriber - {{ isp_name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/subscribers/" class="text-sm text-blue-600 hover:underline">
    <i class="fa fa-arrow-left mr-1"></i> Back
  </a>
</div>
<div class="mb-6"><h2 class="text-2xl font-bold text-gray-800">Add Subscriber Manually</h2></div>
{% include "partials/messages.html" %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sm:p-6 max-w-2xl">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" value="{{ form.username.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        {% if form.username.errors %}<p class="text-red-500 text-xs mt-1">{{ form.username.errors.0 }}</p>{% endif %}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Service Type</label>
        <select name="service_type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          {% for value, label in form.fields.service_type.choices %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">PPP Password</label>
        <input type="password" name="mt_password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">PPP Profile</label>
        <input type="text" name="mt_profile" value="{{ form.mt_profile.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="e.g. default">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="full_name" value="{{ form.full_name.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
        <input type="text" name="phone" value="{{ form.phone.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Cutoff Day</label>
        <input type="number" name="cutoff_day" min="1" max="28" value="{{ form.cutoff_day.value|default:1 }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Billing Effective From</label>
        <input type="date" name="billing_effective_from" value="{{ form.billing_effective_from.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Due Offset Override</label>
        <input type="number" name="billing_due_days" min="0" value="{{ form.billing_due_days.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Use default if blank">
      </div>
      <div class="flex items-center md:col-span-2">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="is_billable" {% if form.is_billable.value or form.is_billable.value == None %}checked{% endif %}
            class="w-4 h-4 rounded border-gray-300 text-blue-600">
          <span class="text-sm text-gray-700">Billable account</span>
        </label>
      </div>
    </div>
    <div class="flex flex-col-reverse gap-3 pt-2 sm:flex-row">
      <a href="/subscribers/" class="inline-flex items-center justify-center text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Cancel</a>
      <button type="submit"
        class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
        Add Subscriber
      </button>
    </div>
  </form>
</div>
{% endblock %}
