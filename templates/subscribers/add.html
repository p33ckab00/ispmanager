{% extends "base.html" %}
{% block title %}Add Subscriber - {{ isp_name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/subscribers/" class="text-sm text-blue-600 hover:underline">
    <i class="fa fa-arrow-left mr-1"></i> Back
  </a>
</div>
<div class="mb-6"><h2 class="text-2xl font-bold text-gray-800">Add Subscriber Manually</h2></div>
{% include "partials/messages.html" %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" value="{{ form.username.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        {% if form.username.errors %}<p class="text-red-500 text-xs mt-1">{{ form.username.errors.0 }}</p>{% endif %}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Service Type</label>
        <select name="service_type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          {% for value, label in form.fields.service_type.choices %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">PPP Password</label>
        <input type="password" name="mt_password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">PPP Profile</label>
        <input type="text" name="mt_profile" value="{{ form.mt_profile.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="e.g. default">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="full_name" value="{{ form.full_name.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
        <input type="text" name="phone" value="{{ form.phone.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
        Add Subscriber
      </button>
      <a href="/subscribers/" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
