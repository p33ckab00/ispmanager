<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal - {{ isp_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
    <div class="text-center mb-8">
      <h1 class="text-xl font-bold text-gray-800">{{ isp_name }}</h1>
      <p class="text-gray-500 text-sm mt-1">Client Portal</p>
    </div>
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm
          {% if message.tags == 'error' %}bg-red-50 text-red-700{% else %}bg-blue-50 text-blue-700{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Your Phone Number</label>
        <input type="text" name="phone"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          value="{{ form.phone.value|default:'' }}"
          placeholder="+63 9XX XXX XXXX" autofocus>
        {% if form.phone.errors %}
        <p class="text-xs text-red-500 mt-1">{{ form.phone.errors.0 }}</p>
        {% endif %}
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg text-sm transition">
        Send Code
      </button>
    </form>
  </div>
</body>
</html>
