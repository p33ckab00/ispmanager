{% extends "base.html" %}
{% block title %}{{ title }} - {{ isp_name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/subscribers/plans/" class="text-sm text-blue-600 hover:underline">
    <i class="fa fa-arrow-left mr-1"></i> Back to Plans
  </a>
</div>
<div class="mb-6"><h2 class="text-2xl font-bold text-gray-800">{{ title }}</h2></div>
{% include "partials/messages.html" %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-lg">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Plan Name</label>
      <input type="text" name="name" value="{{ form.name.value|default:'' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="e.g. 15Mbps Basic">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Download Speed (Mbps)</label>
        <input type="number" step="0.1" name="speed_down_mbps" value="{{ form.speed_down_mbps.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Upload Speed (Mbps)</label>
        <input type="number" step="0.1" name="speed_up_mbps" value="{{ form.speed_up_mbps.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Rate (PHP)</label>
      <input type="number" step="0.01" name="monthly_rate" value="{{ form.monthly_rate.value|default:'' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea name="description" rows="2"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{ form.description.value|default:'' }}</textarea>
    </div>
    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="is_active" {% if form.is_active.value %}checked{% endif %}
        class="w-4 h-4 rounded border-gray-300 text-blue-600">
      <span class="text-sm text-gray-700">Active</span>
    </label>
    <div class="flex gap-3">
      <button type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
        Save Plan
      </button>
      <a href="/subscribers/plans/" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
