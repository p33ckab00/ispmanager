{% extends "base.html" %}
{% block title %}Remove Router - {{ isp_name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/routers/{{ router.pk }}/" class="text-sm text-blue-600 hover:underline">
    <i class="fa fa-arrow-left mr-1"></i> Back
  </a>
</div>
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-md">
  <div class="text-center">
    <i class="fa fa-triangle-exclamation text-4xl text-red-400 mb-4"></i>
    <h2 class="text-xl font-bold text-gray-800 mb-2">Remove Router?</h2>
    <p class="text-sm text-gray-500 mb-6">
      This will deactivate <strong>{{ router.name }}</strong> and hide it from the system.
      Subscriber records linked to this router will not be deleted.
    </p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
        class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
        Yes, Remove
      </button>
      <a href="/routers/{{ router.pk }}/"
        class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-2 rounded-lg text-sm transition">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
