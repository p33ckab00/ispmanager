{% extends "base.html" %}
{% block title %}Edit {{ router.name }} - {{ isp_name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/routers/{{ router.pk }}/" class="text-sm text-blue-600 hover:underline">
    <i class="fa fa-arrow-left mr-1"></i> Back to {{ router.name }}
  </a>
</div>
<div class="mb-6">
  <h2 class="text-2xl font-bold text-gray-800">Edit Router</h2>
</div>
{% include "partials/messages.html" %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <form method="post">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Router Name</label>
        <input type="text" name="name" value="{{ form.name.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">IP Address / Host</label>
        <input type="text" name="host" value="{{ form.host.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">API Port</label>
        <input type="number" name="api_port" value="{{ form.api_port.value|default:8728 }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" value="{{ form.username.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" value="{{ form.password.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
        <input type="text" name="location" value="{{ form.location.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <input type="text" name="description" value="{{ form.description.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div class="flex gap-3">
      <button type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
        Save Changes
      </button>
      <a href="/routers/{{ router.pk }}/" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
