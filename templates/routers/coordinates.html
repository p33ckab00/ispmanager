{% extends "base.html" %}
{% block title %}Coordinates - {{ router.name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/routers/{{ router.pk }}/" class="text-sm text-blue-600 hover:underline">
    <i class="fa fa-arrow-left mr-1"></i> Back to {{ router.name }}
  </a>
</div>
<div class="mb-6"><h2 class="text-2xl font-bold text-gray-800">Update Coordinates</h2></div>
{% include "partials/messages.html" %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-md">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Location Name</label>
      <input type="text" name="location" value="{{ form.location.value|default:'' }}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Latitude</label>
        <input type="number" step="any" name="latitude" value="{{ form.latitude.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="e.g. 14.5995">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Longitude</label>
        <input type="number" step="any" name="longitude" value="{{ form.longitude.value|default:'' }}"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="e.g. 120.9842">
      </div>
    </div>
    <button type="submit"
      class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm transition">
      Save Coordinates
    </button>
  </form>
</div>
{% endblock %}
