<header class="fixed top-0 left-64 right-0 h-16 bg-white border-b border-gray-200 flex items-center px-6 z-30">
  <div class="flex-1">
    <h1 class="text-lg font-semibold text-gray-800">{% block page_title %}Dashboard{% endblock %}</h1>
  </div>
  <div class="flex items-center gap-4">
    <a href="/notifications/" class="text-gray-500 hover:text-gray-800 relative">
      <i class="fa fa-bell text-lg"></i>
    </a>
    <span class="text-sm text-gray-500">{{ request.user.get_full_name|default:request.user.username }}</span>
  </div>
</header>
