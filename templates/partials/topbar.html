<header class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-200 flex items-center px-4 sm:px-6 z-30 lg:left-64">
  <div class="flex items-center gap-3 flex-1 min-w-0">
    <button type="button" class="inline-flex items-center justify-center h-10 w-10 rounded-lg border border-gray-200 text-gray-600 hover:text-gray-900 hover:border-gray-300 transition lg:hidden" @click="mobileNavOpen = true">
      <i class="fa fa-bars"></i>
      <span class="sr-only">Open navigation</span>
    </button>
    <div class="min-w-0">
      <h1 class="text-lg font-semibold text-gray-800 truncate">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>
  </div>
  <div class="flex items-center gap-3 sm:gap-4">
    <a href="/notifications/" class="text-gray-500 hover:text-gray-800 relative">
      <i class="fa fa-bell text-lg"></i>
    </a>
    <span class="hidden sm:inline text-sm text-gray-500 truncate max-w-48">{{ request.user.get_full_name|default:request.user.username }}</span>
  </div>
</header>
