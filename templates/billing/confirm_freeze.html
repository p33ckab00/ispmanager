{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-md">
  <div class="text-center mb-6">
    <i class="fa fa-lock text-4xl text-blue-500 mb-3"></i>
    <h2 class="text-xl font-bold text-gray-800">Freeze and Issue Statement?</h2>
    <p class="text-sm text-gray-500 mt-2">{{ snapshot.snapshot_number }} for {{ snapshot.subscriber.display_name }}</p>
    <p class="text-sm text-gray-400 mt-1">Once frozen, this statement cannot be modified. It will be visible to the client.</p>
  </div>
  <form method="post" class="flex gap-3 justify-center">
    {% csrf_token %}
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg text-sm">Freeze and Issue</button>
    <a href="/billing/snapshots/{{ snapshot.pk }}/" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-2 rounded-lg text-sm">Cancel</a>
  </form>
</div>
{% endblock %}
